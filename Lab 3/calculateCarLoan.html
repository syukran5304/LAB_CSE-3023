<html>
    <head>
        <title>Performing loan car</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <body>
        <h1>Perform Car Loan Calculation</h1>
        <form id="memberFrm" action="processCalculateCarLoan.jsp" method="post" onsubmit="return checkICNo()">
            <fieldset>
                <legend> Loan Calculation </legend>
            <input type="text" name="amount" required />    
            <select name="years">
                <option value="0">3 years</option>
                <option value="1">4 years</option>
                <option value="2">5 years</option>
                <option value="3">7 years</option>
            </select>
            <br/><br/>
                <p>
                    <input type="submit" id="btnSubmit" value="Submit">

                </p>
            </fieldset>
        </form>
    </body>
